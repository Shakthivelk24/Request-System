# ============================================================
# Grafana Datasource Configuration
# ============================================================
# Automatically provisions Prometheus as the default datasource.
#
# Project : Request System - Secure DevOps Pipeline
# ============================================================

apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:

  - name: Prometheus

    type: prometheus

    access: proxy

    orgId: 1

    url: http://prometheus:9090

    isDefault: true

    editable: true

    version: 1