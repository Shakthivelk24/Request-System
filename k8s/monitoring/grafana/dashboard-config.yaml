# ============================================================
# Grafana Dashboard Provider
# ============================================================
# Automatically loads dashboards stored in
# /var/lib/grafana/dashboards
# ============================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-dashboard-provider
  namespace: request-system

data:
  dashboard.yaml: |
    apiVersion: 1

    providers:
      - name: "Request System Dashboards"

        orgId: 1

        folder: ""

        type: file

        disableDeletion: false

        editable: true

        options:
          path: /var/lib/grafana/dashboards