# ============================================================
# Grafana Datasource Configuration
# ============================================================
# Automatically provisions Prometheus as the default datasource.
#
# Grafana --> Prometheus --> Backend (/metrics)
#
# ============================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-datasource
  namespace: request-system

  labels:
    app: grafana

data:
  datasource.yaml: |
    apiVersion: 1

    datasources:

      - name: Prometheus

        type: prometheus

        access: proxy

        url: http://prometheus-service:9090

        isDefault: true

        editable: true