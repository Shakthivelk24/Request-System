# ============================================================
# Grafana Deployment
# ============================================================
# Deploys Grafana in the monitoring namespace.
#
# Features:
# - Persistent Storage
# - Prometheus Datasource Provisioning
# - Dashboard Provisioning
# - SMTP Email Notifications
# ============================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana
  namespace: request-system

  labels:
    app: grafana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana

          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          # ============================================
          # Environment Variables
          # ============================================
          envFrom:
            - secretRef:
                name: grafana-secret

          env:
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost/grafana"

            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

          volumeMounts:

            # Persistent Storage
            - name: grafana-storage
              mountPath: /var/lib/grafana

            # Datasource Provisioning
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml

            # Dashboard Provider
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yaml
              subPath: dashboard.yaml

            # Dashboard JSON Files
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:

        # Persistent Storage
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc

        # Datasource ConfigMap
        - name: grafana-datasource
          configMap:
            name: grafana-datasource

        # Dashboard Provider ConfigMap
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider

        # Dashboard JSON ConfigMap
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards