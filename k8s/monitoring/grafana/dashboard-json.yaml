apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-dashboards
  namespace: request-system

data:
  request-system-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 0,
      "panels": [],
      "refresh": "5s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "request-system"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "title": "Request System Dashboard",
      "version": 1
    }