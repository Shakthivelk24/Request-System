# ============================================================
# Prometheus Service
# ============================================================
# Exposes Prometheus inside the Kubernetes cluster.
#
# Service Type:
# - ClusterIP
#
# Why ClusterIP?
# - Prometheus is accessed internally by Grafana.
# - It does not need to be publicly exposed.
#
# Grafana connects using:
# http://prometheus-service:9090
# ============================================================

apiVersion: v1
kind: Service

metadata:
  name: prometheus-service
  namespace: request-system

  labels:
    app: prometheus

spec:
  type: ClusterIP

  selector:
    app: prometheus

  ports:
    - name: http
      protocol: TCP

      # Service Port
      port: 9090

      # Prometheus Container Port
      targetPort: 9090